<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nfcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E94560;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Card background -->
  <rect x="5" y="12" width="50" height="36" rx="4" ry="4" fill="url(#cardGrad)" stroke="#E94560" stroke-width="1.5"/>
  
  <!-- Chip -->
  <rect x="10" y="22" width="12" height="10" rx="1.5" ry="1.5" fill="#FFD700" stroke="#DAA520" stroke-width="0.5"/>
  <line x1="13" y1="22" x2="13" y2="32" stroke="#DAA520" stroke-width="0.5"/>
  <line x1="16" y1="22" x2="16" y2="32" stroke="#DAA520" stroke-width="0.5"/>
  <line x1="19" y1="22" x2="19" y2="32" stroke="#DAA520" stroke-width="0.5"/>
  <line x1="10" y1="25" x2="22" y2="25" stroke="#DAA520" stroke-width="0.5"/>
  <line x1="10" y1="29" x2="22" y2="29" stroke="#DAA520" stroke-width="0.5"/>
  
  <!-- NFC waves -->
  <path d="M42 20 Q48 24 48 30 Q48 36 42 40" fill="none" stroke="url(#nfcGrad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M46 23 Q50 26 50 30 Q50 34 46 37" fill="none" stroke="url(#nfcGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M50 26 Q52 28 52 30 Q52 32 50 34" fill="none" stroke="url(#nfcGrad)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Tangem text -->
  <text x="30" y="44" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">TANGEM</text>
